# Solon — workflow de release.
#
# Trigger: push de tag `v*` (ex: `v0.6.0`). A action builda os 3 OS,
# assina os bundles com a chave Ed25519 do updater, sobe os instaladores
# como assets do GitHub Release, e gera o `latest.json` que o plugin
# updater le pra detectar nova versao.
#
# Setup do UPDATER (Ed25519) — necessario uma vez:
#   1. Gerar keypair: `npx tauri signer generate -w ~/.tauri/solon.key`
#   2. Cole a public key em src-tauri/tauri.conf.json (campo `pubkey`)
#   3. Adicione 2 secrets no repo (Settings > Secrets and variables > Actions):
#        TAURI_SIGNING_PRIVATE_KEY            -> conteudo do solon.key
#        TAURI_SIGNING_PRIVATE_KEY_PASSWORD   -> senha definida na geracao
#
# Code signing WINDOWS (Authenticode — opcional, elimina o SmartScreen
# "editor desconhecido"). Sem o setup abaixo, o step de import e' no-op
# e os builds saem nao-assinados (comportamento default).
#   1. Compre cert OV/EV num CA (SSL.com, Sectigo, etc) -> arquivo .pfx
#   2. Base64-encode o .pfx (PowerShell):
#        $b = [IO.File]::ReadAllBytes("solon.pfx")
#        [Convert]::ToBase64String($b) | Set-Clipboard
#   3. Extraia o thumbprint (SHA-1 do cert publico):
#        Get-PfxData -FilePath solon.pfx -Password (Read-Host -AsSecureString) `
#          | Select -Expand EndEntityCertificates | Select Thumbprint
#   4. Adicione 2 secrets no repo:
#        WINDOWS_CERTIFICATE             -> o base64 do passo 2
#        WINDOWS_CERTIFICATE_PASSWORD    -> senha do .pfx
#   5. Em src-tauri/tauri.conf.json, dentro de `bundle.windows`, adicione:
#        "certificateThumbprint": "<o thumbprint do passo 3>"
#   6. Commit + tag + push. Aguarde a Action; o `.msi` sai assinado.
#
# Ciclo de release:
#   git tag v0.6.0
#   git push origin v0.6.0
#   (espera ~15min — Action publica release no GitHub automaticamente)

name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      # Necessario pra a tauri-action criar o release e fazer upload dos
      # bundles + latest.json.
      contents: write
    strategy:
      # Uma falha num OS nao mata os outros — release fica incompleto
      # mas pelo menos o que buildou tem o `.json` correto pra updater.
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deps de sistema do Linux pra webview/gtk. Sem isso o build em
      # ubuntu falha com "webkit2gtk not found".
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache do Rust acelera builds subsequentes drasticamente (de ~10min
      # pra ~3min em hits). Inclui src-tauri/target e ~/.cargo.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      # Code signing Windows (Authenticode). Decodifica o .pfx do secret,
      # importa no cert store CurrentUser\My do runner e apaga o arquivo.
      # Quando `tauri build` rodar em seguida, signtool.exe acha o cert
      # pelo `certificateThumbprint` configurado em tauri.conf.json e
      # assina o .msi/.exe automaticamente.
      #
      # No-op se WINDOWS_CERTIFICATE nao estiver setado — assim builds
      # sem cert configurado continuam funcionando (saem nao-assinados).
      - name: Import Windows code signing certificate
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERT_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERT_B64) {
            Write-Host "WINDOWS_CERTIFICATE nao configurado — pulando code signing."
            exit 0
          }
          # Decodifica o base64 do secret pro disco do runner.
          $bytes = [Convert]::FromBase64String($env:CERT_B64)
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $bytes)

          # Importa no cert store CurrentUser\My. O signtool (chamado
          # pelo Tauri) acha o cert por thumbprint dentro desse store.
          $pwd = ConvertTo-SecureString -String $env:CERT_PWD -AsPlainText -Force
          Import-PfxCertificate `
            -FilePath $pfxPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $pwd | Out-Null

          # Limpa o .pfx do disco — minimiza janela de exposicao da chave
          # privada. O cert ja esta no store; o arquivo nao e mais util.
          Remove-Item $pfxPath -Force
          Write-Host "Certificado importado no store CurrentUser\My."

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Solon ${{ github.ref_name }}'
          # Body do release. Pode trocar pra `body-path: CHANGELOG.md` se
          # quiser que cada release puxe direto do changelog.
          releaseBody: |
            Veja as notas completas no `CHANGELOG.md`.

            **Instalacao:**
            - Windows: `.msi` ou `.nsis.zip` abaixo
            - macOS: `.dmg` (Apple Silicon e Intel separados)
            - Linux: `.AppImage`

            Apps ja instalados detectam essa versao automaticamente no
            proximo boot e oferecem update via banner.
          releaseDraft: false
          prerelease: false
          # CRITICO: gera o `latest.json` consumido pelo plugin-updater.
          # Sem isso o endpoint do tauri.conf.json retorna 404 e o app
          # fica em "Erro ao verificar updates" silencioso.
          includeUpdaterJson: true
